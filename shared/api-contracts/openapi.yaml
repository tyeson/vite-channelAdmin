openapi: 3.0.3
info:
  title: 渠道管理系统 API
  description: 渠道管理系统后端 API 文档
  version: 1.0.0
  contact:
    name: API Support
    email: support@example.com

servers:
  - url: http://localhost:8080
    description: 开发环境
  - url: https://api.example.com
    description: 生产环境

tags:
  - name: auth
    description: 认证管理
  - name: user
    description: 用户管理

paths:
  /auth/login:
    post:
      tags:
        - auth
      summary: 用户登录
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginParam'
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResult'

  /auth/logout:
    post:
      tags:
        - auth
      summary: 用户登出
      operationId: logout
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 登出成功

  /auth/user-info:
    get:
      tags:
        - auth
      summary: 获取当前用户信息
      operationId: getUserInfo
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 成功获取用户信息
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserInfo'

  /system/user/page:
    get:
      tags:
        - user
      summary: 分页查询用户
      operationId: getUserPage
      security:
        - bearerAuth: []
      parameters:
        - name: username
          in: query
          schema:
            type: string
        - name: nickname
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: integer
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: 成功获取用户列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPageResult'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    LoginParam:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          description: 用户名
        password:
          type: string
          description: 密码
        remember:
          type: boolean
          description: 记住我

    LoginResult:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          type: object
          properties:
            token:
              type: string
            user:
              $ref: '#/components/schemas/UserInfo'

    UserInfo:
      type: object
      properties:
        id:
          type: integer
          format: int64
        username:
          type: string
        nickname:
          type: string
        avatar:
          type: string
        roles:
          type: array
          items:
            type: string
        permissions:
          type: array
          items:
            type: string

    User:
      type: object
      properties:
        id:
          type: integer
          format: int64
        username:
          type: string
        nickname:
          type: string
        email:
          type: string
        phone:
          type: string
        status:
          type: integer
        createTime:
          type: string
          format: date-time
        lastLoginTime:
          type: string
          format: date-time

    UserPageResult:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          type: object
          properties:
            list:
              type: array
              items:
                $ref: '#/components/schemas/User'
            total:
              type: integer
              format: int64
            page:
              type: integer
            pageSize:
              type: integer
